<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Guestlist</title>
  <style>
    :root{--bg:#0f1115;--card:#171a21;--muted:#8f98aa;--txt:#f5f7fb;--line:#2a2f3a;--ok:#32d583;--warn:#ffcc66;--bad:#ff6b6b;--blue:#7aa7ff}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}.wrap{max-width:760px;margin:0 auto;padding:18px 14px 90px}.top{position:sticky;top:0;background:linear-gradient(var(--bg) 80%,rgba(15,17,21,0));z-index:5;padding:14px 0}h1{font-size:28px;margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:21px}.stat span{font-size:12px;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0}.tabs{display:flex;gap:8px;margin:12px 0}.tab{flex:1;border:1px solid var(--line);background:#11141a;color:var(--txt);border-radius:14px;padding:12px;font-weight:700}.tab.active{background:var(--txt);color:#111}.section{display:none}.section.active{display:block}label{display:block;font-size:13px;color:var(--muted);margin:8px 0 6px}input,textarea{width:100%;border:1px solid var(--line);background:#0c0e13;color:var(--txt);border-radius:14px;padding:14px;font-size:17px;outline:none}textarea{min-height:150px;resize:vertical}.btn{border:0;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:800;background:var(--blue);color:#071021;width:100%;margin-top:10px}.btn.secondary{background:#252b36;color:var(--txt);border:1px solid var(--line)}.btn.ok{background:var(--ok);color:#06130d}.btn.bad{background:var(--bad);color:#210606}.btn.warn{background:var(--warn);color:#1b1300}.result{margin-top:12px}.guest{border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;background:#10131a}.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.name{font-size:19px;font-weight:850}.pill{font-size:12px;border-radius:99px;padding:6px 9px;background:#252b36;color:var(--muted);white-space:nowrap}.pill.ok{background:rgba(50,213,131,.15);color:var(--ok)}.pill.full{background:rgba(255,107,107,.15);color:var(--bad)}.meta{color:var(--muted);font-size:14px;margin-top:8px;line-height:1.45}.mini{font-size:12px;color:var(--muted);line-height:1.45}.danger{color:var(--bad)}.success{color:var(--ok)}.footer{position:fixed;bottom:0;left:0;right:0;background:#0b0d12;border-top:1px solid var(--line);padding:10px 14px}.footer .mini{max-width:760px;margin:0 auto}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hidden{display:none}.sample{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#0c0e13;border:1px solid var(--line);padding:10px;border-radius:12px;color:#c8d0df;font-size:13px;white-space:pre-wrap}</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Guestlist</h1>
    <div class="stats">
      <div class="stat"><b id="sGuests">0</b><span>guest</span></div>
      <div class="stat"><b id="sRights">0</b><span>toplam hak</span></div>
      <div class="stat"><b id="sUsed">0</b><span>giriş</span></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="door">Kapı</button>
    <button class="tab" data-tab="add">Ekle</button>
    <button class="tab" data-tab="list">Liste</button>
  </div>

  <section id="door" class="section active">
    <div class="card">
      <label>İsim ara</label>
      <input id="search" placeholder="Örn: Ali" autocomplete="off" />
      <div id="results" class="result"></div>
    </div>
  </section>

  <section id="add" class="section">
    <div class="card">
      <label>Tek guest ekle</label>
      <input id="singleName" placeholder="İsim Soyisim" />
      <label>+ kaç kişi? Kendisi hariç</label>
      <input id="singlePlus" type="number" min="0" inputmode="numeric" placeholder="Örn: 2" />
      <button id="addSingle" class="btn">Guest Ekle</button>
    </div>

    <div class="card">
      <label>Toplu guest ekle</label>
      <textarea id="bulk" placeholder="Ali Yılmaz +2&#10;Ayşe Demir&#10;Mehmet Kaya +1"></textarea>
      <div class="mini">Kural: <b>Ali +2</b> yazarsa Ali dahil toplam <b>3 hak</b> açılır.</div>
      <button id="addBulk" class="btn">Toplu Aktar</button>
      <div class="sample">Örnek:
Ali Yılmaz +2
Ayşe Demir
Mehmet Kaya +1</div>
    </div>
  </section>

  <section id="list" class="section">
    <div class="card">
      <div class="two">
        <button id="exportCsv" class="btn secondary">CSV İndir</button>
        <button id="clearAll" class="btn bad">Listeyi Sil</button>
      </div>
      <div id="allList" class="result"></div>
    </div>
  </section>
</div>

<div class="footer"><div class="mini">Veriler bu cihazın tarayıcısında saklanır. Aynı listeyi farklı cihazlarda kullanmak için CSV aktarımı gerekir.</div></div>

<script>
(function(){
  var KEY='kuvet_guestlist_plus_v1';
  var guests=[];
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
  function norm(s){return (s||'').toLocaleLowerCase('tr-TR').replace(/ı/g,'i').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
  function save(){localStorage.setItem(KEY,JSON.stringify(guests)); renderStats(); renderAll(); renderSearch();}
  function load(){try{guests=JSON.parse(localStorage.getItem(KEY)||'[]')||[]}catch(e){guests=[]}}
  function parseLine(line){
    line=(line||'').trim().replace(/\s+/g,' ');
    if(!line) return null;
    var m=line.match(/^(.*?)(?:\s*\+\s*(\d+))\s*$/);
    var name=line, plus=0;
    if(m && m[1].trim()){ name=m[1].trim(); plus=parseInt(m[2]||'0',10)||0; }
    name=name.replace(/[;,]+$/,'').trim();
    if(!name) return null;
    return {name:name, rights:1+plus, used:0, createdAt:new Date().toISOString(), id:uid()};
  }
  function addGuest(name, plus){
    name=(name||'').trim().replace(/\s+/g,' ');
    plus=parseInt(plus||'0',10)||0;
    if(!name) return alert('İsim gir.');
    guests.push({id:uid(),name:name,rights:1+Math.max(0,plus),used:0,createdAt:new Date().toISOString()});
    save();
  }
  function renderStats(){
    var rights=guests.reduce((a,g)=>a+(g.rights||1),0);
    var used=guests.reduce((a,g)=>a+(g.used||0),0);
    document.getElementById('sGuests').textContent=guests.length;
    document.getElementById('sRights').textContent=rights;
    document.getElementById('sUsed').textContent=used;
  }
  function guestCard(g){
    var left=(g.rights||1)-(g.used||0);
    var full=left<=0;
    return '<div class="guest">'+
      '<div class="row"><div class="name">'+esc(g.name)+'</div><div class="pill '+(full?'full':'ok')+'">'+(full?'Hak bitti':'Kalan '+left)+'</div></div>'+
      '<div class="meta">Toplam hak: <b>'+(g.rights||1)+'</b> · Kullanılan: <b>'+(g.used||0)+'</b> · Kalan: <b>'+Math.max(0,left)+'</b></div>'+
      '<button class="btn '+(full?'secondary':'ok')+'" data-enter="'+g.id+'" '+(full?'disabled':'')+'>'+(full?'Hak Tamamlandı':'+1 Giriş Yap')+'</button>'+
      '<button class="btn secondary" data-undo="'+g.id+'">Son Girişi Geri Al</button>'+
    '</div>'
  }
  function renderSearch(){
    var q=norm(document.getElementById('search').value);
    var el=document.getElementById('results');
    if(!q){el.innerHTML='<div class="mini">İsim yazınca sonuçlar burada görünür.</div>';return}
    var found=guests.filter(g=>norm(g.name).indexOf(q)>-1).slice(0,20);
    el.innerHTML=found.length?found.map(guestCard).join(''):'<div class="guest danger">Listede bulunamadı.</div>';
  }
  function renderAll(){
    var el=document.getElementById('allList');
    if(!el) return;
    var sorted=guests.slice().sort((a,b)=>a.name.localeCompare(b.name,'tr'));
    el.innerHTML=sorted.length?sorted.map(guestCard).join(''):'<div class="mini">Liste boş.</div>';
  }
  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
  function enter(id){var g=guests.find(x=>x.id===id); if(!g)return; if((g.used||0)>=(g.rights||1)){alert('Bu guest list hakkının tamamı kullanılmış.');return} g.used=(g.used||0)+1; save();}
  function undo(id){var g=guests.find(x=>x.id===id); if(!g)return; if((g.used||0)>0) g.used--; save();}
  function csv(){
    var rows=[['İsim','Toplam Hak','Kullanılan','Kalan']].concat(guests.map(g=>[g.name,g.rights||1,g.used||0,(g.rights||1)-(g.used||0)]));
    var text=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    var blob=new Blob([text],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='guestlist.csv'; a.click(); URL.revokeObjectURL(a.href);
  }
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.matches('.tab')){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active');renderAll();renderSearch();}
    if(t.dataset.enter) enter(t.dataset.enter);
    if(t.dataset.undo) undo(t.dataset.undo);
  });
  document.getElementById('search').addEventListener('input',renderSearch);
  document.getElementById('addSingle').addEventListener('click',function(){addGuest(document.getElementById('singleName').value,document.getElementById('singlePlus').value);document.getElementById('singleName').value='';document.getElementById('singlePlus').value='';alert('Guest eklendi.');});
  document.getElementById('addBulk').addEventListener('click',function(){
    var lines=document.getElementById('bulk').value.split(/\n|\r/).map(parseLine).filter(Boolean);
    if(!lines.length) return alert('Aktarılacak isim bulunamadı.');
    guests=guests.concat(lines); document.getElementById('bulk').value=''; save(); alert(lines.length+' guest aktarıldı.');
  });
  document.getElementById('clearAll').addEventListener('click',function(){if(confirm('Tüm liste silinsin mi?')){guests=[];save();}});
  document.getElementById('exportCsv').addEventListener('click',csv);
  load(); renderStats(); renderAll(); renderSearch();
})();
</script>
</body>
</html>
